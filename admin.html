<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Add New Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .admin-header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .admin-header p {
            color: var(--text-light);
            font-size: 1.1rem;
        }
        
        .admin-form {
            background: var(--bg-white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 1.1rem;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.1rem;
            transition: var(--transition);
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .form-group small {
            display: block;
            margin-top: 5px;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        .tech-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .tech-input {
            flex: 1;
        }
        
        .add-tech-btn {
            padding: 10px 20px;
            background: var(--secondary-color);
            color: var(--text-white);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .tech-tag {
            background: var(--primary-color);
            color: var(--text-white);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .remove-tech {
            cursor: pointer;
            font-weight: bold;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: var(--text-white);
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .submit-btn:hover {
            background: var(--primary-dark);
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .hidden {
            display: none;
        }
        
        .back-link {
            text-align: center;
            margin-top: 30px;
        }
        
        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .existing-projects {
            margin-top: 50px;
        }
        
        .existing-projects h2 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .projects-list {
            display: grid;
            gap: 20px;
        }
        
        .project-item {
            background: var(--bg-white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: var(--shadow-md);
        }
        
        .project-image {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .project-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .project-info {
            flex: 1;
        }
        
        .project-info h3 {
            color: var(--text-dark);
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        
        .project-info p {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        
        .project-tech .tech-tag {
            background: var(--primary-color);
            color: var(--text-white);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        
        .project-actions {
            display: flex;
            gap: 10px;
        }
        
        .edit-btn, .delete-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        
        .edit-btn {
            background: var(--primary-color);
            color: var(--text-white);
        }
        
        .edit-btn:hover {
            background: var(--primary-dark);
        }
        
        .delete-btn {
            background: #dc3545;
            color: var(--text-white);
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        .no-projects {
            text-align: center;
            color: var(--text-light);
            font-size: 1.1rem;
            padding: 40px;
        }
        
        .error {
            text-align: center;
            color: #dc3545;
            font-size: 1.1rem;
            padding: 40px;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: var(--bg-white);
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .close {
            color: var(--text-light);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .close:hover {
            color: var(--text-dark);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Admin Panel</h1>
            <p>Add a new project to your portfolio</p>
        </div>
        
        <div id="message" class="message hidden"></div>
        
        <form class="admin-form" id="projectForm">
            <div class="form-group">
                <label for="title">Project Title *</label>
                <input type="text" id="title" name="title" required>
            </div>
            
            <div class="form-group">
                <label for="description">Project Description *</label>
                <textarea id="description" name="description" required placeholder="Describe your project in detail..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="image_url">Image URL *</label>
                <input type="url" id="image_url" name="image_url" required placeholder="https://example.com/image.jpg">
                <small>Enter a direct link to the project image</small>
            </div>
            
            <div class="form-group">
                <label for="live_demo_url">Live Demo URL</label>
                <input type="url" id="live_demo_url" name="live_demo_url" placeholder="https://example.com/demo">
                <small>Optional: Link to the live demo</small>
            </div>
            
            <div class="form-group">
                <label for="github_url">GitHub URL</label>
                <input type="url" id="github_url" name="github_url" placeholder="https://github.com/username/project">
                <small>Optional: Link to the GitHub repository</small>
            </div>
            
            <div class="form-group">
                <label>Technologies *</label>
                <div class="tech-input-container">
                    <input type="text" id="techInput" class="tech-input" placeholder="Enter a technology (e.g., React)">
                    <button type="button" class="add-tech-btn" onclick="addTechnology()">Add</button>
                </div>
                <div id="techTags" class="tech-tags"></div>
                <small>Add at least one technology used in the project</small>
                <input type="hidden" id="technologies" name="technologies" required>
            </div>
            
            <button type="submit" class="submit-btn">Add Project</button>
        </form>
        
        <div class="existing-projects">
            <h2>Existing Projects</h2>
            <div id="projectsList" class="projects-list">
                <div class="loading">Loading projects...</div>
            </div>
        </div>
        
        <div class="back-link">
            <a href="index.html">← Back to Portfolio</a>
        </div>
    </div>

    <!-- Edit Project Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Edit Project</h2>
            <form id="editForm">
                <input type="hidden" id="editProjectId" name="id">
                
                <div class="form-group">
                    <label for="editTitle">Project Title *</label>
                    <input type="text" id="editTitle" name="title" required>
                </div>
                
                <div class="form-group">
                    <label for="editDescription">Project Description *</label>
                    <textarea id="editDescription" name="description" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="editImageUrl">Image URL *</label>
                    <input type="url" id="editImageUrl" name="image_url" required>
                </div>
                
                <div class="form-group">
                    <label for="editLiveDemoUrl">Live Demo URL</label>
                    <input type="url" id="editLiveDemoUrl" name="live_demo_url">
                </div>
                
                <div class="form-group">
                    <label for="editGithubUrl">GitHub URL</label>
                    <input type="url" id="editGithubUrl" name="github_url">
                </div>
                
                <div class="form-group">
                    <label>Technologies *</label>
                    <div class="tech-input-container">
                        <input type="text" id="editTechInput" class="tech-input" placeholder="Enter a technology">
                        <button type="button" class="add-tech-btn" onclick="addEditTechnology()">Add</button>
                    </div>
                    <div id="editTechTags" class="tech-tags"></div>
                    <input type="hidden" id="editTechnologies" name="technologies" required>
                </div>
                
                <button type="submit" class="submit-btn">Update Project</button>
            </form>
        </div>
    </div>

    <script>
        let technologies = [];
        let editTechnologies = [];
        
        // Load existing projects
        async function loadProjects() {
            try {
                const response = await fetch('get_projects.php');
                const result = await response.json();
                
                const projectsList = document.getElementById('projectsList');
                
                if (result.success && result.projects.length > 0) {
                    projectsList.innerHTML = '';
                    
                    result.projects.forEach(project => {
                        const projectItem = createProjectItem(project);
                        projectsList.appendChild(projectItem);
                    });
                } else {
                    projectsList.innerHTML = '<div class="no-projects">No projects found.</div>';
                }
            } catch (error) {
                console.error('Error loading projects:', error);
                const projectsList = document.getElementById('projectsList');
                projectsList.innerHTML = '<div class="error">Error loading projects.</div>';
            }
        }
        
        function createProjectItem(project) {
            const item = document.createElement('div');
            item.className = 'project-item';
            
            const techTags = project.technologies.map(tech => 
                `<span class="tech-tag">${tech.trim()}</span>`
            ).join('');
            
            item.innerHTML = `
                <div class="project-image">
                    <img src="${project.image_url}" alt="${project.title}">
                </div>
                <div class="project-info">
                    <h3>${project.title}</h3>
                    <p>${project.description}</p>
                    <div class="project-tech">${techTags}</div>
                    <div class="project-actions">
                        <button class="edit-btn" onclick="editProject(${project.id})">Edit</button>
                        <button class="delete-btn" onclick="deleteProject(${project.id})">Delete</button>
                    </div>
                </div>
            `;
            
            return item;
        }
        
        // Delete project
        async function deleteProject(projectId) {
            if (!confirm('Are you sure you want to delete this project?')) {
                return;
            }
            
            try {
                const response = await fetch('delete_project.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `id=${projectId}`
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Project deleted successfully!', 'success');
                    loadProjects(); // Reload projects list
                } else {
                    showMessage('Error: ' + result.message, 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }
        
        // Edit project
        async function editProject(projectId) {
            try {
                const response = await fetch('get_projects.php');
                const result = await response.json();
                
                if (result.success) {
                    const project = result.projects.find(p => p.id === projectId);
                    if (project) {
                        openEditModal(project);
                    }
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }
        
        function openEditModal(project) {
            document.getElementById('editProjectId').value = project.id;
            document.getElementById('editTitle').value = project.title;
            document.getElementById('editDescription').value = project.description;
            document.getElementById('editImageUrl').value = project.image_url;
            document.getElementById('editLiveDemoUrl').value = project.live_demo_url || '';
            document.getElementById('editGithubUrl').value = project.github_url || '';
            
            editTechnologies = [...project.technologies];
            updateEditTechTags();
            
            document.getElementById('editModal').style.display = 'block';
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            editTechnologies = [];
        }
        
        // Add technology functions for edit modal
        function addEditTechnology() {
            const input = document.getElementById('editTechInput');
            const tech = input.value.trim();
            
            if (tech && !editTechnologies.includes(tech)) {
                editTechnologies.push(tech);
                updateEditTechTags();
                input.value = '';
                input.focus();
            }
        }
        
        function removeEditTechnology(tech) {
            editTechnologies = editTechnologies.filter(t => t !== tech);
            updateEditTechTags();
        }
        
        function updateEditTechTags() {
            const container = document.getElementById('editTechTags');
            const hiddenInput = document.getElementById('editTechnologies');
            
            container.innerHTML = '';
            editTechnologies.forEach(tech => {
                const tag = document.createElement('div');
                tag.className = 'tech-tag';
                tag.innerHTML = `
                    ${tech}
                    <span class="remove-tech" onclick="removeEditTechnology('${tech}')">&times;</span>
                `;
                container.appendChild(tag);
            });
            
            hiddenInput.value = editTechnologies.join(',');
        }
        
        // Original add technology functions
        function addTechnology() {
            const input = document.getElementById('techInput');
            const tech = input.value.trim();
            
            if (tech && !technologies.includes(tech)) {
                technologies.push(tech);
                updateTechTags();
                input.value = '';
                input.focus();
            }
        }
        
        function removeTechnology(tech) {
            technologies = technologies.filter(t => t !== tech);
            updateTechTags();
        }
        
        function updateTechTags() {
            const container = document.getElementById('techTags');
            const hiddenInput = document.getElementById('technologies');
            
            container.innerHTML = '';
            technologies.forEach(tech => {
                const tag = document.createElement('div');
                tag.className = 'tech-tag';
                tag.innerHTML = `
                    ${tech}
                    <span class="remove-tech" onclick="removeTechnology('${tech}')">&times;</span>
                `;
                container.appendChild(tag);
            });
            
            hiddenInput.value = technologies.join(',');
        }
        
        // Handle Enter key in technology inputs
        document.getElementById('techInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTechnology();
            }
        });
        
        document.getElementById('editTechInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addEditTechnology();
            }
        });
        
        // Handle add project form submission
        document.getElementById('projectForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (technologies.length === 0) {
                showMessage('Please add at least one technology', 'error');
                return;
            }
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('add_project.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Project added successfully!', 'success');
                    this.reset();
                    technologies = [];
                    updateTechTags();
                    loadProjects(); // Reload projects list
                } else {
                    showMessage('Error: ' + result.message, 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        });
        
        // Handle edit project form submission
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (editTechnologies.length === 0) {
                showMessage('Please add at least one technology', 'error');
                return;
            }
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('update_project.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Project updated successfully!', 'success');
                    closeEditModal();
                    loadProjects(); // Reload projects list
                } else {
                    showMessage('Error: ' + result.message, 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        });
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                closeEditModal();
            }
        }
        
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.classList.remove('hidden');
            
            setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 5000);
        }
        
        // Load projects when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadProjects();
        });
    </script>
</body>
</html>
