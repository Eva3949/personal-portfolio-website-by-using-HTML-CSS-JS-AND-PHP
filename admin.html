<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Add New Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .admin-header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .admin-header p {
            color: var(--text-light);
            font-size: 1.1rem;
        }
        
        .admin-form {
            background: var(--bg-white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 1.1rem;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.1rem;
            transition: var(--transition);
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .form-group small {
            display: block;
            margin-top: 5px;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        .tech-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .tech-input {
            flex: 1;
        }
        
        .add-tech-btn {
            padding: 10px 20px;
            background: var(--secondary-color);
            color: var(--text-white);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .tech-tag {
            background: var(--primary-color);
            color: var(--text-white);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .remove-tech {
            cursor: pointer;
            font-weight: bold;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: var(--text-white);
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .submit-btn:hover {
            background: var(--primary-dark);
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .hidden {
            display: none;
        }
        
        .back-link {
            text-align: center;
            margin-top: 30px;
        }
        
        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Admin Panel</h1>
            <p>Add a new project to your portfolio</p>
        </div>
        
        <div id="message" class="message hidden"></div>
        
        <form class="admin-form" id="projectForm">
            <div class="form-group">
                <label for="title">Project Title *</label>
                <input type="text" id="title" name="title" required>
            </div>
            
            <div class="form-group">
                <label for="description">Project Description *</label>
                <textarea id="description" name="description" required placeholder="Describe your project in detail..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="image_url">Image URL *</label>
                <input type="url" id="image_url" name="image_url" required placeholder="https://example.com/image.jpg">
                <small>Enter a direct link to the project image</small>
            </div>
            
            <div class="form-group">
                <label for="live_demo_url">Live Demo URL</label>
                <input type="url" id="live_demo_url" name="live_demo_url" placeholder="https://example.com/demo">
                <small>Optional: Link to the live demo</small>
            </div>
            
            <div class="form-group">
                <label for="github_url">GitHub URL</label>
                <input type="url" id="github_url" name="github_url" placeholder="https://github.com/username/project">
                <small>Optional: Link to the GitHub repository</small>
            </div>
            
            <div class="form-group">
                <label>Technologies *</label>
                <div class="tech-input-container">
                    <input type="text" id="techInput" class="tech-input" placeholder="Enter a technology (e.g., React)">
                    <button type="button" class="add-tech-btn" onclick="addTechnology()">Add</button>
                </div>
                <div id="techTags" class="tech-tags"></div>
                <small>Add at least one technology used in the project</small>
                <input type="hidden" id="technologies" name="technologies" required>
            </div>
            
            <button type="submit" class="submit-btn">Add Project</button>
        </form>
        
        <div class="back-link">
            <a href="index.html">← Back to Portfolio</a>
        </div>
    </div>

    <script>
        let technologies = [];
        
        function addTechnology() {
            const input = document.getElementById('techInput');
            const tech = input.value.trim();
            
            if (tech && !technologies.includes(tech)) {
                technologies.push(tech);
                updateTechTags();
                input.value = '';
                input.focus();
            }
        }
        
        function removeTechnology(tech) {
            technologies = technologies.filter(t => t !== tech);
            updateTechTags();
        }
        
        function updateTechTags() {
            const container = document.getElementById('techTags');
            const hiddenInput = document.getElementById('technologies');
            
            container.innerHTML = '';
            technologies.forEach(tech => {
                const tag = document.createElement('div');
                tag.className = 'tech-tag';
                tag.innerHTML = `
                    ${tech}
                    <span class="remove-tech" onclick="removeTechnology('${tech}')">&times;</span>
                `;
                container.appendChild(tag);
            });
            
            hiddenInput.value = technologies.join(',');
        }
        
        // Handle Enter key in technology input
        document.getElementById('techInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                addTechnology();
            }
        });
        
        // Handle form submission
        document.getElementById('projectForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (technologies.length === 0) {
                showMessage('Please add at least one technology', 'error');
                return;
            }
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('add_project.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Project added successfully!', 'success');
                    this.reset();
                    technologies = [];
                    updateTechTags();
                } else {
                    showMessage('Error: ' + result.message, 'error');
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        });
        
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.classList.remove('hidden');
            
            setTimeout(() => {
                messageEl.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
